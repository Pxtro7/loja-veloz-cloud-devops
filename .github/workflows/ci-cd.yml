# ============================================
# GitHub Actions CI/CD Pipeline
# Loja Veloz - E-commerce Microservices
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/loja-veloz

jobs:
  # ==========================================
  # Lint and Test
  # ==========================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            services/api-gateway/package.json
            services/pedidos/package.json
            services/pagamentos/package.json
            services/estoque/package.json

      - name: Install dependencies
        run: |
          for service in api-gateway pedidos pagamentos estoque; do
            cd services/$service
            npm install
            cd ../..
          done

      - name: Run linters
        run: |
          for service in api-gateway pedidos pagamentos estoque; do
            echo "Linting $service..."
            cd services/$service
            npm run lint || true
            cd ../..
          done

      - name: Run tests
        run: |
          for service in api-gateway pedidos pagamentos estoque; do
            echo "Testing $service..."
            cd services/$service
            npm test || true
            cd ../..
          done

  # ==========================================
  # Security Scan
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
          output: 'trivy-results.txt'

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt

  # ==========================================
  # Build Docker Images
  # ==========================================
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG="v1.0.${{ github.run_number }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Pedidos
        uses: docker/build-push-action@v5
        with:
          context: ./services/pedidos
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pedidos:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pedidos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Pagamentos
        uses: docker/build-push-action@v5
        with:
          context: ./services/pagamentos
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pagamentos:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pagamentos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Estoque
        uses: docker/build-push-action@v5
        with:
          context: ./services/estoque
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/estoque:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/estoque:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Deploy to Development
  # ==========================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          cd kubernetes
          kubectl apply -k overlays/dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n loja-veloz-dev --timeout=300s
          kubectl rollout status deployment/pedidos -n loja-veloz-dev --timeout=300s
          kubectl rollout status deployment/pagamentos -n loja-veloz-dev --timeout=300s
          kubectl rollout status deployment/estoque -n loja-veloz-dev --timeout=300s

  # ==========================================
  # Deploy to Production (requires approval)
  # ==========================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event.inputs.environment != 'dev'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          cd kubernetes
          kubectl apply -k overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n loja-veloz-prod --timeout=300s
          kubectl rollout status deployment/pedidos -n loja-veloz-prod --timeout=300s
          kubectl rollout status deployment/pagamentos -n loja-veloz-prod --timeout=300s
          kubectl rollout status deployment/estoque -n loja-veloz-prod --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n loja-veloz-prod
          kubectl get services -n loja-veloz-prod
