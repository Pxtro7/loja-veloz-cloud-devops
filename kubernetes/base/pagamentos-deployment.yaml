# ============================================
# Pagamentos Service Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagamentos
  namespace: loja-veloz
  labels:
    app.kubernetes.io/name: pagamentos
    app.kubernetes.io/component: deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pagamentos
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pagamentos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: loja-veloz-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: pagamentos
          image: loja-veloz/pagamentos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: loja-veloz-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
---
# ============================================
# Pagamentos Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: pagamentos-service
  namespace: loja-veloz
  labels:
    app.kubernetes.io/name: pagamentos
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pagamentos
  ports:
    - name: http
      port: 3002
      targetPort: http
      protocol: TCP
